<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores • Aula 02</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #2d1b3d 0%, #3d1f2e 100%);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        @media (prefers-color-scheme: dark) {
            .container {
                background: rgba(30, 30, 46, 0.95);
            }
        }

        .container:hover {
            transform: translateY(-4px);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
            text-align: center;
            letter-spacing: -0.5px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: -0.2px;
            margin-bottom: 24px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 87, 108, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .resultados {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
            pointer-events: none;
        }

        .resultados.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .secao {
            background: rgba(245, 87, 108, 0.08);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        @media (prefers-color-scheme: dark) {
            .secao {
                background: rgba(245, 87, 108, 0.15);
            }
        }

        .secao h3 {
            color: #1d1d1f;
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        @media (prefers-color-scheme: dark) {
            .secao h3 {
                color: #f5f5f7;
            }
        }

        .grid-resultados {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .resultado-item {
            padding: 16px;
            background: white;
            border-radius: 12px;
            color: #1d1d1f;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: -0.2px;
            transition: transform 0.2s ease;
            text-align: center;
        }

        @media (prefers-color-scheme: dark) {
            .resultado-item {
                background: rgba(50, 50, 60, 0.8);
                color: #f5f5f7;
            }
        }

        .resultado-item:hover {
            transform: scale(1.05);
        }

        .resultado-item.full {
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .container {
                padding: 32px 24px;
            }

            h1 {
                font-size: 28px;
            }

            .grid-resultados {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Operadores</h1>
        
        <button onclick="calcular()">Executar Operações</button>

        <div class="resultados" id="resultados"></div>
    </div>

    <script src="aula02.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>marcas</title>
  <style>
    :root {
      --bg: #fbf5f9;
      --surface: rgba(255, 255, 255, 0.95);
      --border: rgba(191, 126, 164, 0.28);
      --text: #403041;
      --muted: #7f667f;
      --accent: #af7599;
      --shadow: 0 22px 50px rgba(118, 76, 113, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top, #fff8fb 0%, #f2e9f3 48%, #efebf1 100%);
      color: var(--text);
      padding: 1.5rem;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1.8rem 1.6rem;
      margin-bottom: 1.6rem;
      border-radius: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.8rem);
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 720px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 1rem;
    }

    .card,
    .empty {
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .card {
      padding: 1.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 26px 55px rgba(118, 76, 113, 0.16);
    }

    .card strong {
      display: block;
      margin-bottom: 0.65rem;
      font-size: 1rem;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.96rem;
    }

    .card img {
      width: 100%;
      margin-top: 1rem;
      border-radius: 20px;
      display: block;
      object-fit: cover;
    }

    .empty {
      padding: 1.6rem;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      body {
        padding: 1rem;
      }

      h1 {
        font-size: 2.3rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>marcas</h1>
      <p>lista simples com visual leve e feminino.</p>
    </header>

    <ul id="lista">
      <li class="empty">carregando...</li>
    </ul>
  </main>

  <script src="./script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>marcas - alternativa</title>
  <style>
    :root {
      --bg: #fbf5f9;
      --surface: rgba(255, 255, 255, 0.95);
      --border: rgba(191, 126, 164, 0.28);
      --text: #403041;
      --muted: #7f667f;
      --accent: #af7599;
      --shadow: 0 20px 45px rgba(118, 76, 113, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top, #fff8fb 0%, #f2e9f3 48%, #efebf1 100%);
      color: var(--text);
      padding: 1.4rem;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 0.85rem;
      font-size: clamp(2rem, 4vw, 2.6rem);
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 1.6rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .form-card,
    .item-card,
    .empty {
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .form-card {
      padding: 1.4rem;
      margin-bottom: 1.3rem;
    }

    .form-row {
      display: grid;
      gap: 0.95rem;
      grid-template-columns: 1fr auto;
    }

    input {
      width: 100%;
      padding: 0.95rem 1rem;
      border: 1px solid rgba(158, 118, 149, 0.25);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 0.95rem 1.3rem;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .status {
      margin-top: 0.9rem;
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 1.3rem;
    }

    .status.error {
      color: #b04b77;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 1rem;
    }

    .item-card {
      padding: 1.4rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .item-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 55px rgba(118, 76, 113, 0.16);
    }

    .item-card strong {
      display: block;
      margin-bottom: 0.45rem;
      font-size: 1rem;
    }

    .item-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.97rem;
    }

    .empty {
      padding: 1.6rem;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      body {
        padding: 1rem;
      }

      h1 {
        font-size: 2.2rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>marcas alternativa</h1>
    <p>formulário leve e lista suave.</p>

    <section class="form-card">
      <form id="formCadastro">
        <div class="form-row">
          <input id="campoNome" type="text" placeholder="nome da marca" autocomplete="off" />
          <button type="submit">enviar</button>
        </div>
      </form>
      <p id="status" class="status"> </p>
    </section>

    <ul id="lista2">
      <li class="empty">carregando dados...</li>
    </ul>
  </main>

  <script src="./script2.js"></script>
</body>
</html>

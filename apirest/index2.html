<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>marcas</title>
    <style>
        :root {
            --bg: #faf2f8;
            --surface: rgba(255, 255, 255, 0.94);
            --border: rgba(198, 123, 164, 0.28);
            --text: #402c3f;
            --muted: #7d6179;
            --shadow: 0 24px 60px rgba(113, 75, 109, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top, #fff7fb 0%, #f8ecf5 45%, #f4eff4 100%);
            color: var(--text);
        }

        .page {
            max-width: 1120px;
            margin: 0 auto;
            padding: 2rem 1.4rem 3rem;
        }

        header {
            padding: 1.8rem 1.6rem;
            margin-bottom: 1.5rem;
            border-radius: 32px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        header h1 {
            margin: 0 0 0.55rem;
            font-size: clamp(2.1rem, 4vw, 2.8rem);
            line-height: 1.05;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 620px;
        }

        .cards {
            display: grid;
            gap: 1.3rem;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        }

        .card {
            padding: 1.5rem;
            border-radius: 28px;
            border: 1px solid var(--border);
            background: var(--surface);
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 28px 60px rgba(113, 75, 109, 0.16);
        }

        .card h3 {
            margin: 0 0 0.75rem;
            font-size: 1.12rem;
            color: #3c2435;
        }

        .card p {
            margin: 0;
            color: var(--muted);
            line-height: 1.75;
        }

        .card img {
            width: 100%;
            margin-top: 1rem;
            border-radius: 20px;
            object-fit: cover;
            display: block;
        }

        .empty-state {
            padding: 1.8rem;
            border: 1px dashed rgba(198, 123, 164, 0.35);
            border-radius: 26px;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.72);
        }

        @media (max-width: 520px) {
            .page {
                padding-top: 1.5rem;
            }

            .card {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header>
            <h1>marcas da api</h1>
            <p>listinha pra testar api rest com o fabiano.</p>
        </header>

        <section class="cards" id="lista">
            <article class="card empty-state">
                carregando...
            </article>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
